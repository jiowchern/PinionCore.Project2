# WebGL client 靜態托管(WebGL 壓縮設為 Disabled,毋需 br/gzip Content-Encoding header)
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # 維護模式:旗標檔存在即全站 503(逐 request 檢查,touch/刪除即時生效,毋需 reload)。
    # 維護頁掛載點獨立於 html root,因為 publish/webgl-client 在建置期間會被改寫。
    if (-f /usr/share/nginx/maintenance/on) { return 503; }
    error_page 503 @maintenance;

    location ~ \.wasm$ { default_type application/wasm; }
    location ~ \.data$ { default_type application/octet-stream; }

    location @maintenance {
        root /usr/share/nginx/maintenance;
        rewrite ^ /maintenance.html break;
        add_header Cache-Control "no-store" always;
    }
}
